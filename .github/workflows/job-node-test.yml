name: Node Test
on:
  workflow_call:
    inputs:
      workingDirectory:
        required: false
        type: string
        default: './'
      release_branch:
        description: 'Name of the release branch'
        required: false
        type: string
        default: 'main'
      node_version:
        description: 'Node version to use'
        required: false
        type: string
        default: '24'
      artifactPath:
        required: false
        type: string
        default: 'dist'
      artifactName:
        required: false
        type: string
        default: 'target'
      hasBuild:
        description: 'Whether the project has a build step'
        required: false
        type: boolean
        default: true
      publish:
        description: 'Whether the project has a build step'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
    - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: https://registry.npmjs.org
    - run: npm ci
      working-directory: ${{ inputs.workingDirectory }}
    - run: npm test
      working-directory: ${{ inputs.workingDirectory }}
    - run: npm run build
      if: ${{ inputs.hasBuild }}
      working-directory: ${{ inputs.workingDirectory }}
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: ${{ (github.head_ref || github.ref) == format('refs/heads/{0}', inputs.release_branch ) && inputs.publish}}
      with:
        name: ${{ inputs.artifactName }}
        path: ${{ inputs.artifactPath }}
        retention-days: 1
