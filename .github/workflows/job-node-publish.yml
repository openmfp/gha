name: Node Test
on:
  workflow_call:
    inputs:
      version:
        type: string
        description: 'Version'
        required: true
      workingDirectory:
        required: false
        type: string
        default: './'
      workingDirectoryDist:
        required: false
        type: string
        default: './dist'
      publishFromDist:
        required: false
        type: boolean
        default: false
      node_version:
        description: 'Node version to use'
        required: false
        type: string
        default: '24'
      prefix:
        description: 'The prefix to use for the version'
        required: false
        default: ''
        type: string
      artifactPath:
        required: false
        type: string
        default: 'dist'
      artifactName:
        required: false
        type: string
        default: 'target'
      environment:
        description: 'The environment to use'
        required: true
        type: string
      skipVersionCommit:
        description: 'Whether to skip the version commit and push'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
    - name: Setup Git
      run: |
        git config --global user.name 'OpenMFP Technical User'
        git config --global user.email 'openmfp@gmail.com'
    - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
      id: app-token
      with:
        app-id: "838464"
        private-key: ${{ secrets.OPENMFP_PUBLISHER_PRIVATE_KEY }}
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        token: ${{ steps.app-token.outputs.token }}
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: ${{ inputs.node_version }}
        registry-url: https://registry.npmjs.org
    - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: ${{ inputs.artifactName }}
        path: ${{ inputs.artifactPath }}
      continue-on-error: true
    - name: Clean up prefix from version
      run: |
        CLEANED_VERSION=$(echo ${{ inputs.version }} | cut -c$(wc -c <<<"${{ inputs.prefix }}")-) 
        echo "CLEANED_VERSION=$CLEANED_VERSION" >> $GITHUB_ENV
    - name: Publish from dist folder
      if: ${{ inputs.publishFromDist }}
      run: |
        npm version ${{ env.CLEANED_VERSION }}
        npm publish --provenance --access public
        cd ..
        npm version ${{ env.CLEANED_VERSION }} -m "[no ci] Release ${{ env.CLEANED_VERSION }}"
      working-directory:
        ${{ inputs.workingDirectoryDist }}
    - name: Publish to npmjs
      if: ${{ !inputs.publishFromDist }}
      run: |
        npm version ${{ env.CLEANED_VERSION }} -m "[no ci] Release ${{ env.CLEANED_VERSION }}"
        npm publish --provenance --access public
      working-directory:
        ${{ inputs.workingDirectory }}
    - name: Commit and Tag
      if: ${{ inputs.workingDirectory != './' && !inputs.skipVersionCommit }}
      run: |
        git add .
        git commit -m "[no ci] Release ${{ env.CLEANED_VERSION }}"
        git fetch
        git rebase
    - name: Push
      if: ${{ !inputs.skipVersionCommit }}
      run: |
        git push origin
      working-directory: ${{ inputs.workingDirectory }}
